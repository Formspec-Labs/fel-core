name: ci

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_external_conformance:
        description: "Run sibling Python/WASM differential conformance checks"
        required: false
        default: "false"
  schedule:
    - cron: "17 9 * * 1"

jobs:
  ratification-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: Lint
        run: make lint
      - name: Dependency policy
        run: make deny
      - name: Ratify
        run: make ratify
      - name: Package
        run: make package

  fuzz-replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Replay fel_pipeline crash artifacts
        working-directory: fuzz
        run: |
          for artifact in artifacts/fel_pipeline/*; do
            [ -f "$artifact" ] || continue
            echo "Replaying $artifact..."
            cargo +nightly fuzz run fel_pipeline "$artifact"
          done

  external-conformance:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_external_conformance == 'true')
    runs-on: ubuntu-latest
    env:
      FORMSPEC_REPO_TOKEN: ${{ secrets.FORMSPEC_REPO_TOKEN }}
    steps:
      - name: Checkout fel-core
        uses: actions/checkout@v4
        with:
          path: fel-core
      - name: Skip without sibling repo token
        if: env.FORMSPEC_REPO_TOKEN == ''
        run: |
          echo "::notice::Set FORMSPEC_REPO_TOKEN to run cross-runtime FEL conformance."
      - name: Checkout Formspec runtime repository
        if: env.FORMSPEC_REPO_TOKEN != ''
        uses: actions/checkout@v4
        with:
          repository: Formspec-org/formspec
          token: ${{ secrets.FORMSPEC_REPO_TOKEN }}
          path: formspec
      - name: Set up Rust
        if: env.FORMSPEC_REPO_TOKEN != ''
        uses: dtolnay/rust-toolchain@stable
      - name: Set up Node.js
        if: env.FORMSPEC_REPO_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Set up Python
        if: env.FORMSPEC_REPO_TOKEN != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime dependencies
        if: env.FORMSPEC_REPO_TOKEN != ''
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          sudo apt-get update
          sudo apt-get install -y binaryen
          pip install maturin
          pip install --no-build-isolation ./formspec/crates/formspec-py
          npm --prefix formspec ci
          npm --prefix formspec run build --workspace=@formspec-org/types
          npm --prefix formspec run build --workspace=@formspec-org/engine
      - name: Run differential conformance
        if: env.FORMSPEC_REPO_TOKEN != ''
        working-directory: fel-core
        run: make ratify-external
